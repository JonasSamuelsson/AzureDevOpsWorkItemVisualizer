<!DOCTYPE html>
<html class="full-screen">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
   <title>Azure DevOps Work Item Visualizer</title>
   <base href="/" />
   <link rel="icon" href="/favicon.svg" type="image/svg+xml">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
   <link href="css/app.css" rel="stylesheet" />
</head>

<body class="full-screen">
   <script src="https://d3js.org/d3.v7.min.js" defer></script>
   <script src="https://unpkg.com/@hpcc-js/wasm@2.20.0/dist/graphviz.umd.js" defer></script>
   <script src="https://unpkg.com/d3-graphviz@5.6.0/build/d3-graphviz.min.js" defer></script>

   <div id="app" class="full-screen">
      <div class="app-loading">Loading...</div>
   </div>

   <div id="version-info">Azure DevOps Work Item Visualizer - v###</div>

   <script src="_framework/blazor.webassembly.js" autostart="false"></script>

   <style>
      .full-screen {
         height: 100%;
         width: 100%;
      }

      svg {
         height: 100% !important;
         width: 100% !important;
      }
   </style>

   <script>
      function applyTheme(theme) {
         const root = document.documentElement;
         if (!theme || theme === "system") {
            root.removeAttribute("data-theme");
            return;
         }

         root.setAttribute("data-theme", theme);
      }

      (function loadThemeFromStorage() {
          try {
             const rawTheme = localStorage.getItem("theme");
             if (rawTheme) {
                try {
                   applyTheme(JSON.parse(rawTheme));
                } catch {
                   applyTheme(rawTheme);
                }

                return;
             }

             const rawEditor = localStorage.getItem("editor");
             if (!rawEditor) {
                applyTheme("system");
                return;
             }

             const values = JSON.parse(rawEditor);
             applyTheme(values?.Theme ?? "system");
          } catch {
             applyTheme("system");
          }
      })();

      function updateGraph(content) {
         return new Promise((resolve, reject) => {
            let completed = false;
            const finish = (callback, value) => {
               if (completed) {
                  return;
               }

               completed = true;
               callback(value);
            };
            const normalizeError = (error) => {
               if (error instanceof Error) {
                  return error;
               }

               if (error && typeof error.message === "string") {
                  return new Error(error.message);
               }

               return new Error(`Graph render failed: ${error ?? "unknown error"}`);
            };

            try {
               const renderer = d3.select("#graph").graphviz();
               if (typeof renderer.onerror === "function") {
                  renderer.onerror((error) => {
                     finish(reject, normalizeError(error));
                  });
               }

               renderer.renderDot(content, () => {
                  finish(resolve);
               });
            } catch (error) {
               finish(reject, normalizeError(error));
            }
         });
      }

      Blazor.start({
         loadBootResource: function (type, name, defaultUri) {
            const hostname = window.location.hostname;
            const isLocalhost = hostname === "localhost" || hostname === "127.0.0.1";
            if (!isLocalhost) {
               return defaultUri;
            }

            if (type === "dotnetjs") {
               return defaultUri;
            }

            return fetch(defaultUri, { cache: "no-store" });
         }
      });
   </script>
</body>

</html>
